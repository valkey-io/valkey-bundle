name: Update Valkey Extensions

on:
  repository_dispatch:
    types: [valkey-release, json-release, bloom-release, search-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
      module:
        description: 'Module to release'
        required: true
        type: choice
        options: [valkey, json, bloom, search]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-files:
    name: Update Files and Create PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
          && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && sudo apt update \
          && sudo apt install gh -y

      - name: Check for existing PR
        id: check-pr
        run: |
          PR_NUMBER=$(gh pr list --state open --base mainline --search "head:update-" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            echo "existing_pr=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "Existing PR found: $PR_NUMBER"
          else
            echo "No existing PR found"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout existing PR
        if: steps.check-pr.outputs.existing_pr
        run: |
          gh pr checkout ${{ steps.check-pr.outputs.existing_pr }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Process inputs
        id: process-inputs
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            # From trigger
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "module=${{ github.event.client_payload.module }}" >> $GITHUB_OUTPUT
          else
            # Manual trigger
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "module=${{ github.event.inputs.module }}" >> $GITHUB_OUTPUT
          fi

      - name: Guard against unsupported Valkey versions
        if: ${{ steps.process-inputs.outputs.module == 'valkey' }}
        run: |
          VERSION="${{ steps.process-inputs.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)

          if [ "$MAJOR" -lt 8 ] || { [ "$MAJOR" -eq 8 ] && [ "$MINOR" -lt 1 ]; }; then
            echo "Valkey version must be >= 8.1. Current: $VERSION"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Update versions.json
        run: |
          python scripts/update-versions.py versions.json \
            "${{ steps.process-inputs.outputs.module }}" \
            "${{ steps.process-inputs.outputs.version }}"

      - name: Generate Dockerfiles
        run: |
          # Download the scripts for bashbrew in local
            jqt='.jq-template.awk'
            wget -qO "$jqt" 'https://github.com/docker-library/bashbrew/raw/9f6a35772ac863a0241f147c820354e4008edf38/scripts/jq-template.awk'
            jqf='.template-helper-functions.jq'
            wget -qO "$jqf" 'https://github.com/docker-library/bashbrew/raw/08c926140ad0af22de58c2a2656afda58082ba3e/scripts/template-helper-functions.jq'

          # Run update script
          chmod +x apply-templates.sh
          ./apply-templates.sh
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Regenerate Dockerfiles for ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }}" || echo "No changes to commit"

      - name: Set up bashbrew
        uses: docker-library/bashbrew@v0.1.12

      - name: Generate Jobs Strategy
        id: generate-jobs
        run: |
          BASHBREW_SCRIPTS=/home/runner/work/_actions/docker-library/bashbrew/v0.1.12/scripts
          strategy="$("$BASHBREW_SCRIPTS/github-actions/generate.sh")"
          echo "strategy=$strategy" >> $GITHUB_OUTPUT

      - name: Update DockerHub description
        run: |
          echo '${{ steps.generate-jobs.outputs.strategy }}' > strategy.json
          python scripts/update-dockerhub-description.py strategy.json dockerhub-description-template.md dockerhub-description.md
          rm strategy.json

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-${{ steps.process-inputs.outputs.module }}-${{ steps.process-inputs.outputs.version }}
          delete-branch: true
          title: "Update Valkey Extensions versions"
          commit-message: |
            Update for ${{ steps.process-inputs.outputs.module }} ${{ steps.process-inputs.outputs.version }}
          body: |
            This PR ${{ steps.check-pr.outputs.existing_pr && 'has been updated' || 'was automatically generated' }} with version updates.

            Latest changes:
            - Updated versions.json for ${{ steps.process-inputs.outputs.module }} version ${{ steps.process-inputs.outputs.version }}
            - Regenerated Dockerfiles
            - Updated DockerHub description
