name: GitHub CI

on:
  pull_request:
  push:
    paths:
      - '**/Dockerfile*'
  workflow_dispatch:

defaults:
  run:
    shell: 'bash -Eeuo pipefail -x {0}'

jobs:

  generate-jobs:
    name: Generate Jobs
    runs-on: ubuntu-latest
    outputs:
      strategy: ${{ steps.generate-jobs.outputs.strategy }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker-library/bashbrew@v0.1.12
      - id: generate-jobs
        name: Generate Jobs
        run: |
          strategy="$("$BASHBREW_SCRIPTS/github-actions/generate.sh")"
          echo "strategy=$strategy" >> "$GITHUB_OUTPUT"
          jq . <<<"$strategy" # sanity check / debugging aid
  
  build_and_push:
    needs: 
      - generate-jobs
    strategy: ${{ fromJson(needs.generate-jobs.outputs.strategy) }}
    name: ${{ matrix.name }} - Build and push
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Prepare Tags
        id: prep_tags
        env:
          DOCKERHUB_ACCOUNT: ${{ secrets.DOCKERHUB_ACCOUNT }}
        run: |
          original_tags="${{ toJson(matrix.meta.entries[0].tags) }}"
          tags=$(echo $original_tags | sed "s|valkey-extension|${DOCKERHUB_ACCOUNT}/valkey-extension|g" | sed 's/\[ *//; s/ *\]//; s/ //g' | tr -d '\n')  
          echo "modified_tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          file: ./${{ matrix.meta.entries[0].directory }}/Dockerfile
          push: true
          tags: ${{ steps.prep_tags.outputs.modified_tags }}
          platforms: linux/amd64,linux/arm64
          provenance: false
          load: false

  update-dockerhub-description:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/mainline')
    needs: 
      - generate-jobs
      - build_and_push
    name: Update DockerHub Description
    uses: ./.github/workflows/update-dockerhub-docs.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}