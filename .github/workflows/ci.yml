name: GitHub CI

on:
  pull_request:
  push:
    paths:
      - '**/Dockerfile*'
  workflow_dispatch:

env:
  REGISTRY_IMAGE: ${{ secrets.DOCKERHUB_ACCOUNT }}/valkey-extension

defaults:
  run:
    shell: 'bash -Eeuo pipefail -x {0}'

jobs:

  generate-jobs:
    name: Generate Jobs
    runs-on: ubuntu-latest
    outputs:
      strategy: ${{ steps.generate-jobs.outputs.strategy }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker-library/bashbrew@v0.1.12
      - id: generate-jobs
        run: |
          strategy="$("$BASHBREW_SCRIPTS/github-actions/generate.sh")"
          echo "strategy=$(jq -c . <<<"$strategy")" >> "$GITHUB_OUTPUT"
          jq . <<<"$strategy" # sanity check / debugging aid

  build_and_push:
    needs: 
      - generate-jobs
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.generate-jobs.outputs.strategy).matrix.include }}
        platform: [linux/amd64, linux/arm64]
    name: Build and push - ${{ matrix.version.name }} - ${{ matrix.platform }}
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Tags
        id: prep_tags
        env:
          DOCKERHUB_ACCOUNT: ${{ secrets.DOCKERHUB_ACCOUNT }}
        run: |
          original_tags="${{ toJson(matrix.version.meta.entries[0].tags) }}"
          tags=$(echo $original_tags | sed "s|valkey-extension|${DOCKERHUB_ACCOUNT}/valkey-extension|g" | sed 's/\[ *//; s/ *\]//; s/ //g' | tr -d '\n')  
          echo "modified_tags=$tags" >> "$GITHUB_OUTPUT"
          echo "$tags" > tags.txt

      - name: Upload Tags Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tags-${{ matrix.platform }}-${{ matrix.version.name }}
          path: tags.txt

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          file: ./${{ matrix.version.meta.entries[0].directory }}/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,push-by-digest=true,name-canonical=true
          tags: ${{ env.REGISTRY_IMAGE }}
          provenance: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          echo "${digest#sha256:}" > ${{ runner.temp }}/digests/digest.txt

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform }}-${{ matrix.version.name }}
          path: ${{ runner.temp }}/digests/digest.txt

  merge-manifest:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Download Digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Download Tags
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/tags
          pattern: tags-*
          merge-multiple: true

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Create Multi-Arch Manifest and Push
        run: |
          TAGS=$(cat ${{ runner.temp }}/tags/*.txt | tr ',' '\n' | sed 's/^/-t /' | tr '\n' ' ')
          DIGESTS=$(cat ${{ runner.temp }}/digests/*.txt | awk '{print "${{ env.REGISTRY_IMAGE }}@sha256:" $1}' | tr '\n' ' ')
          docker buildx imagetools create $TAGS $DIGESTS

  update-dockerhub-description:
    if: github.event_name == 'push' && github.ref == 'refs/heads/mainline'
    needs: merge-manifest
    name: Update DockerHub Description
    uses: ./.github/workflows/update-dockerhub-docs.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
