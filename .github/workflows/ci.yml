name: GitHub CI

on:
  pull_request:
  push:
    branches:
      - mainline
    paths:
      - '**/Dockerfile'
  workflow_dispatch:

env:
  IS_PULL: ${{ github.event_name == 'pull_request' }}
  HAS_SECRETS: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' && secrets.DOCKERHUB_ACCOUNT != '' && secrets.DOCKERHUB_REPOSITORY != '' }}

defaults:
  run:
    shell: 'bash -Eeuo pipefail -x {0}'

jobs:

  generate-jobs:
    name: Generate Jobs
    runs-on: ubuntu-latest
    outputs:
      strategy: ${{ steps.generate-jobs.outputs.strategy }}
      has-secrets: ${{ steps.generate-jobs.outputs.has-secrets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: docker-library/bashbrew@v0.1.12

      - id: generate-jobs
        name: Generate Jobs
        run: |
          strategy="$("$BASHBREW_SCRIPTS/github-actions/generate.sh")"
          # For pushes to mainline or PRs targeting mainline, only build changed versions
          if [[ ("${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/mainline")]] ; then
            changed_files=$(git diff --name-only HEAD~1 HEAD)
            if printf "%s\n" "$changed_files" | grep -qE "^(versions\.json|[0-9]+\.[0-9]+/|unstable/)"; then
              changed_versions=$(echo $changed_files | grep -oE "[0-9]+\.[0-9]+|unstable" | sort -u | tr '\n' '|' | sed 's/|$//')
              if [[ -n "$changed_versions" ]]; then
                strategy=$(jq -c --arg versions "$changed_versions" '{"fail-fast": .["fail-fast"],"matrix":{"include":[ .matrix.include[]|select(.meta.entries[0].directory | test($versions))]}}' <<<"$strategy")
              fi
            else
              strategy='{"fail-fast": false, "matrix": {"include": []}}'
            fi
          fi

          echo "strategy=$(jq -c . <<<"$strategy")" >> "$GITHUB_OUTPUT"
          echo "has-secrets=${{ env.HAS_SECRETS }}" >> "$GITHUB_OUTPUT"
          jq . <<<"$strategy" # debugging aid to visually inspect the generated matrix
  # Job to build and push Docker images individually for each architecture/platform
  build_and_push:
    needs: [generate-jobs]
    strategy:
      fail-fast: false # continue other jobs even if one job fails
      matrix:
        version: ${{ fromJson(needs.generate-jobs.outputs.strategy).matrix.include }}
        platform: [linux/amd64, linux/arm64]

    name: Build and push - ${{ matrix.version.name }} - ${{ matrix.platform }}

    # Dynamic runner selection based on architecture
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}

    steps:
      - uses: docker-library/bashbrew@v0.1.12
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Replace "/" with "-" in platform name for valid artifact naming
      - name: Prepare platform name
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set DOCKER_REPO_NAME dynamically
        run: |
          if [[ "${{ env.IS_PULL }}" == "true" ]]; then
            echo "DOCKER_REPO_NAME=${{ github.actor }}/valkey-bundle" >> $GITHUB_ENV
          elif [[ "${{ env.HAS_SECRETS }}" != "true" ]]; then
            echo "DOCKER_REPO_NAME=${{ github.actor }}/valkey-bundle" >> $GITHUB_ENV
          else
            echo "DOCKER_REPO_NAME=${{ secrets.DOCKERHUB_ACCOUNT }}/valkey-bundle" >> $GITHUB_ENV
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: env.IS_PULL != 'true' && env.HAS_SECRETS == 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Prepare Docker tags from version metadata, replacing repository name with ACCOUNT/DOCKER_REPOSITORY
      - name: Prepare Tags
        id: prep_tags
        run: |
          original_tags="${{ toJson(matrix.version.meta.entries[0].tags) }}"
          tags=$(echo $original_tags | sed "s|valkey-bundle|${{ env.DOCKER_REPO_NAME }}|g" \
          | sed 's/\[ *//; s/ *\]//; s/ //g' | tr -d '\n')  
          echo "modified_tags=$tags" >> "$GITHUB_OUTPUT"
          echo "$tags" > tags.txt

      - name: Upload Tags Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tags-${{ matrix.version.name }}
          path: tags.txt
          overwrite: true

      # Build Docker images and push them to Docker Hub by digest (sha256)
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          file: ./${{ matrix.version.meta.entries[0].directory }}/Dockerfile
          platforms: ${{ matrix.platform }}
          # Push is true only for push events if the secrets have been created
          push: ${{ env.HAS_SECRETS == 'true' && env.IS_PULL != 'true' }}
          outputs: type=image,push-by-digest=true,name-canonical=true
          tags: ${{ env.DOCKER_REPO_NAME }}
          provenance: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          pull: true
      
      - name: Prepare Environment
        run: ${{ matrix.version.runs.prepare }}

      - name: Validation Tests ${{ matrix.version.name }}
        run: |
          docker images
          set -- "${{ env.DOCKER_REPO_NAME }}"
          if [ -s ./.test/config.sh ]; then
            set -- --config ~/oi/test/config.sh --config ./.test/config.sh "$@";
          fi
          ~/oi/test/run.sh "$@"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      # Core + Module Integration Tests 
      - name: All Core + Module Tests
        run: |
          matrix_version="${{ matrix.version.name }}"
          bundle_version=$(echo "$matrix_version" | cut -d'.' -f1-2)
          
          ./.test/tests/valkey-integration-tests/run.sh "${{ env.DOCKER_REPO_NAME }}" "$bundle_version"
          
      # Export digest to a file to reference it later in merging manifests
      - name: Export digest
        id: export-digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
          
          version="${{ matrix.version.name }}"
          major_minor=$(echo "$version" | cut -d'.' -f1-2)
          
          directory="${{ matrix.version.meta.entries[0].directory }}"
          if [[ "$directory" == *"alpine"* ]]; then
            distro="alpine"
          else
            distro="debian"
          fi
          
          echo "linux_distro=$distro" >> "$GITHUB_OUTPUT"
          echo "version_major_minor=$major_minor" >> "$GITHUB_OUTPUT"
    
      - name: Upload digest for version-distro combination
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.export-digest.outputs.version_major_minor }}-${{ steps.export-digest.outputs.linux_distro }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Job to merge architecture-specific images into a single multi-arch manifest
  merge-manifest:
    runs-on: ubuntu-latest
    needs: [generate-jobs, build_and_push]
    steps:
      - name: Set DOCKER_REPO_NAME dynamically
        run: |
          if [[ "${{ env.IS_PULL }}" == "true" || "${{ env.HAS_SECRETS }}" != "true" ]]; then
            echo "DOCKER_REPO_NAME=${{ github.actor }}/valkey-bundle" >> $GITHUB_ENV
          else
            echo "DOCKER_REPO_NAME=${{ secrets.DOCKERHUB_ACCOUNT }}/valkey-bundle" >> $GITHUB_ENV
          fi

      - name: Download All Digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/all-digests
          pattern: digests-*
          merge-multiple: false

      - name: Download All Tags
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/all-tags
          pattern: tags-*
          merge-multiple: false

      - name: Login to Docker Hub
        if: env.HAS_SECRETS == 'true' && env.IS_PULL != 'true'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: env.HAS_SECRETS == 'true'
        uses: docker/setup-buildx-action@v3

      # Use imagetools to combine the arch-specific digests into respective multi-arch manifest
      - name: Create Multi-Arch Manifest and Push
        working-directory: ${{ runner.temp }}
        run: |
          declare -A combinations
          for digest_artifact_dir in all-digests/digests-*; do
            [[ -d "$digest_artifact_dir" ]] || continue
            artifact_name=$(basename "$digest_artifact_dir")
            if [[ "$artifact_name" =~ digests-(.+)-(alpine|debian|bookworm|trixie)-linux-.+ ]]; then
              version="${BASH_REMATCH[1]}"
              distro="${BASH_REMATCH[2]}"
              combo="${version}-${distro}"
              combinations["$combo"]=1
            fi
          done

          for combo in "${!combinations[@]}"; do
            if [[ "$combo" =~ (.+)-(alpine|debian|bookworm|trixie)$ ]]; then
              version="${BASH_REMATCH[1]}"
              distro="${BASH_REMATCH[2]}"
            else
              continue
            fi

            mkdir -p "digests/$combo"
            find all-digests/ -name "digests-${combo}-*" -exec sh -c 'cp "$1"/* "$2"/' _ {} "digests/$combo/" \; 2>/dev/null
            digest_count=$(ls -1 "digests/$combo" 2>/dev/null | wc -l)
            [[ $digest_count -gt 0 ]] || continue
            
            if [[ "$distro" == "alpine" ]]; then
                tag_dir=$(find all-tags/ -name "tags-${version}*-alpine" -type d | head -1)
            else
                tag_dir=$(find all-tags/ -name "tags-${version}*" -type d | grep -v "\-alpine$" | head -1)
            fi

            tag_file="$tag_dir/tags.txt"
            [[ -f "$tag_file" ]] || continue
            
            all_tags=$(cat "$tag_file" | sed 's/,/ /g')

            if [[ "$distro" == "alpine" ]]; then
              tags=$(echo "$all_tags" | tr ' ' '\n' | grep alpine | tr '\n' ' ')
            else
              tags=$(echo "$all_tags" | tr ' ' '\n' | grep -v alpine | tr '\n' ' ')
            fi
            [[ -n "$tags" ]] || continue
            
            tag_args=$(printf -- "-t %s " $tags)
            digest_args=$(printf "${{ env.DOCKER_REPO_NAME }}@sha256:%s " digests/$combo/*)
            digest_args=${digest_args//digests\/$combo\//}
            
            if [[ "${{ env.IS_PULL }}" == "true" || "${{ env.HAS_SECRETS }}" != "true" ]]; then
              echo "Dry run: docker buildx imagetools create $tag_args $digest_args"
            else
              docker buildx imagetools create $tag_args $digest_args
            fi
          done

  update-dockerhub-description:
    if: github.event_name == 'push' && github.ref == 'refs/heads/mainline' && needs.generate-jobs.outputs.has-secrets == 'true'
    needs: [merge-manifest, generate-jobs]
    name: Update DockerHub Description
    uses: ./.github/workflows/update-dockerhub-docs.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}